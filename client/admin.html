<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CryptoTrade Admin | Support Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e27; color: #fff; }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; background: rgba(18,25,55,0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; margin-bottom: 24px;
            flex-wrap: wrap; gap: 15px;
        }
        .logo h1 { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #fff, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-btn {
            position: relative;
            padding: 10px 24px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover, .nav-btn.active { background: linear-gradient(135deg, #00d4ff, #0099cc); border-color: transparent; }
        
        .nav-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-grid { display: grid; grid-template-columns: 360px 1fr; gap: 24px; height: calc(100vh - 120px); }
        
        .users-section {
            background: rgba(18,25,55,0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
            padding: 20px; display: flex; flex-direction: column; overflow: hidden;
        }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .search-bar {
            margin-bottom: 15px;
            position: relative;
        }
        .search-bar input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .search-bar input:focus { border-color: #00d4ff; }
        .search-bar i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a92b0;
        }
        .clear-search {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8a92b0;
            display: none;
        }
        
        .filter-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #8a92b0;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .filter-btn:hover { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .filter-btn.active { background: #00d4ff; color: #000; border-color: #00d4ff; }
        
        .users-list { flex: 1; overflow-y: auto; }
        .user-item {
            padding: 15px; background: rgba(255,255,255,0.03); border-radius: 16px;
            margin-bottom: 10px; cursor: pointer; transition: all 0.3s; border: 1px solid transparent;
            position: relative;
        }
        .user-item:hover { background: rgba(0,212,255,0.1); transform: translateX(4px); }
        .user-item.active { background: rgba(0,212,255,0.15); border-color: #00d4ff; }
        .user-name { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .user-email { font-size: 11px; color: #8a92b0; margin-top: 4px; word-break: break-all; }
        .user-balance { font-size: 12px; color: #00d4ff; margin-top: 6px; }
        
        .delete-user-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,71,87,0.2);
            border: 1px solid #ff4757;
            color: #ff4757;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }
        .user-item:hover .delete-user-btn { display: block; }
        .delete-user-btn:hover { background: #ff4757; color: white; }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .status-online {
            background: rgba(0,230,118,0.2);
            color: #00e676;
        }
        .status-offline {
            background: rgba(138,146,176,0.2);
            color: #8a92b0;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.online {
            background: #00e676;
            box-shadow: 0 0 5px #00e676;
            animation: pulse-green 1.5s infinite;
        }
        @keyframes pulse-green {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .user-unread-count {
            background: #ff4757;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }
        .last-seen { font-size: 10px; color: #5a6280; margin-top: 4px; }
        
        .chat-section {
            background: rgba(18,25,55,0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .chat-with { font-size: 18px; font-weight: 700; }
        .chat-with span { color: #00d4ff; }
        .chat-messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .chat-message { margin-bottom: 20px; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-message.user { align-items: flex-start; }
        .chat-message.admin { align-items: flex-end; }
        .message-bubble {
            max-width: 70%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.4;
        }
        .chat-message.user .message-bubble { background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .chat-message.admin .message-bubble { background: linear-gradient(135deg, #00d4ff, #0099cc); border-bottom-right-radius: 4px; color: #000; }
        .chat-image {
            max-width: 250px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 5px;
        }
        .message-sender { font-size: 11px; color: #8a92b0; margin-bottom: 4px; }
        .message-time { font-size: 10px; color: #5a6280; margin-top: 4px; }
        .chat-input-area { 
            padding: 20px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            gap: 12px;
            align-items: center;
        }
        .chat-input-area input {
            flex: 1; padding: 14px 18px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; color: white; font-size: 14px;
            outline: none;
        }
        .chat-input-area input:focus { outline: none; border-color: #00d4ff; }
        .chat-input-area button {
            padding: 14px 28px; background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none; border-radius: 40px; color: white; cursor: pointer; font-weight: 600;
        }
        .attach-btn {
            background: rgba(255,255,255,0.1);
            padding: 12px 16px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .attach-btn:hover {
            background: rgba(0,212,255,0.3);
            transform: scale(1.05);
        }
        .image-preview {
            margin-top: 8px;
            padding: 10px;
            position: relative;
            display: inline-block;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        .preview-img {
            max-width: 80px;
            max-height: 60px;
            border-radius: 8px;
        }
        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
        }
        .no-user-selected { text-align: center; color: #5a6280; margin-top: 50px; }
        .empty-state { text-align: center; padding: 50px; color: #5a6280; }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
        }
        .image-viewer.active { display: flex; }
        .image-viewer img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .close-viewer {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a3e;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-content h3 {
            margin-bottom: 15px;
            color: #ff4757;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        .confirm-btn { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .cancel-btn { background: #8a92b0; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00e676;
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 4000;
            animation: slideIn 0.3s ease;
        }
        .toast.error { background: #ff4757; color: white; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; height: auto; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><h1>CRYPTOTRADE <span style="color:#00d4ff;">SUPPORT</span></h1></div>
            <div class="nav-buttons">
                <a href="admin.html" class="nav-btn active">💬 Chat <span id="chatBadge" class="nav-badge" style="display:none;">0</span></a>
                <a href="admin-deposits.html" class="nav-btn">💰 Deposits <span id="depositsBadge" class="nav-badge" style="display:none;">0</span></a>
                <a href="admin-withdrawals.html" class="nav-btn">💸 Withdrawals <span id="withdrawalsBadge" class="nav-badge" style="display:none;">0</span></a>
                <button class="nav-btn" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div class="main-grid">
            <div class="users-section">
                <div class="section-title"><i class="fas fa-users"></i> Users</div>
                
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by name or email..." onkeyup="filterUsers()">
                    <i class="fas fa-times-circle clear-search" id="clearSearch" onclick="clearSearch()" style="display:none;"></i>
                </div>
                
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All Users</button>
                    <button class="filter-btn" data-filter="online" onclick="setFilter('online')">🟢 Online</button>
                    <button class="filter-btn" data-filter="offline" onclick="setFilter('offline')">⚫ Offline</button>
                    <button class="filter-btn" data-filter="unread" onclick="setFilter('unread')">📩 Unread</button>
                </div>
                
                <div id="usersList" class="users-list">
                    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading users...</p></div>
                </div>
            </div>

            <div class="chat-section">
                <div class="chat-header">
                    <div class="chat-with">Chatting with: <span id="selectedUserName">Select a user</span></div>
                </div>
                <div id="chatMessages" class="chat-messages">
                    <div class="no-user-selected">
                        <i class="fas fa-comments" style="font-size:48px;opacity:0.3;"></i>
                        <p style="margin-top:16px;">Select a user to start chatting</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div class="attach-btn" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-image"></i>
                    </div>
                    <input type="text" id="chatInput" placeholder="Type your reply..." onkeypress="if(event.key==='Enter') sendAdminReply()">
                    <button onclick="sendAdminReply()"><i class="fas fa-paper-plane"></i> Send</button>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadAdminImage()">
                <div id="imagePreview" style="display:none;">
                    <div class="image-preview">
                        <img id="previewImg" class="preview-img">
                        <div class="remove-image" onclick="cancelImage()">×</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h3>
            <p id="deleteMessage">Are you sure you want to delete this user?</p>
            <p style="font-size: 12px; color: #ff4757; margin-top: 10px;">This action cannot be undone!</p>
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="confirmDeleteUser()">Delete User</button>
                <button class="cancel-btn" onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="imageViewer" class="image-viewer" onclick="closeImageViewer()">
        <span class="close-viewer" onclick="closeImageViewer()">&times;</span>
        <img id="viewerImg" src="">
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000'
            : (window.location.origin || 'https://cryptotrade-pro.onrender.com');
        
        console.log('🔗 API URL:', API_URL);
        
        let selectedUserId = null;
        let selectedUserName = null;
        let allUsers = [];
        let filteredUsers = [];
        let currentFilter = 'all';
        let currentSearchTerm = '';
        let unreadCounts = {};
        let totalUnreadMessages = 0;
        let deleteTarget = null;
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
        
        function checkAdmin() {
            const token = localStorage.getItem('token');
            const isAdmin = localStorage.getItem('isAdmin');
            if (!token && !isAdmin) {
                window.location.href = 'admin-login.html';
            }
        }
        
        function fixImageUrl(url) {
            if (!url) return '';
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            const cleanUrl = url.replace(/^\/+/, '');
            return `${API_URL}/${cleanUrl}`;
        }
        
        function cancelImage() {
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }
        
        async function uploadAdminImage() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file || !selectedUserId) {
                if (!selectedUserId) showToast('Please select a user first', true);
                return;
            }
            if (!file.type.startsWith('image/')) {
                showToast('Please select an image file', true);
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('Image too large. Max 5MB', true);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch(`${API_URL}/api/upload-image`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    const data = await response.json();
                    const imageUrl = fixImageUrl(data.imageUrl);
                    await fetch(`${API_URL}/api/admin/reply`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: selectedUserId, text: imageUrl, adminName: 'Admin' })
                    });
                    cancelImage();
                    await loadUserMessages(selectedUserId);
                    showToast('Image sent successfully!');
                } else {
                    showToast('Upload failed', true);
                }
            } catch (error) {
                console.error('Error uploading image:', error);
                showToast('Error uploading image', true);
            }
        }
        
        async function loadUsers() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/api/admin/users-with-status`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (response.ok) {
                    const data = await response.json();
                    allUsers = data.users || [];
                } else {
                    const fallbackRes = await fetch(`${API_URL}/api/admin/users`);
                    if (fallbackRes.ok) {
                        const fallbackData = await fallbackRes.json();
                        allUsers = fallbackData.users || [];
                        allUsers.forEach(user => { user.status = 'offline'; });
                    }
                }
                await loadUnreadCounts();
                applyFilters();
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading users</p></div>';
            }
        }
        
        async function loadUnreadCounts() {
            try {
                totalUnreadMessages = 0;
                unreadCounts = {};
                for (const user of allUsers) {
                    try {
                        const response = await fetch(`${API_URL}/api/admin/messages/${user.id}`);
                        if (response.ok) {
                            const data = await response.json();
                            const messages = data.messages || [];
                            const unreadCount = messages.filter(m => m.sender === 'user' && !m.adminRead).length;
                            if (unreadCount > 0) {
                                unreadCounts[user.id] = unreadCount;
                                totalUnreadMessages += unreadCount;
                            }
                        }
                    } catch (e) {}
                }
                const badge = document.getElementById('chatBadge');
                if (badge) {
                    if (totalUnreadMessages > 0) {
                        badge.style.display = 'flex';
                        badge.innerText = totalUnreadMessages > 99 ? '99+' : totalUnreadMessages;
                    } else {
                        badge.style.display = 'none';
                    }
                }
            } catch (error) { console.error('Error loading unread counts:', error); }
        }
        
        function applyFilters() {
            let filtered = [...allUsers];
            if (currentSearchTerm) {
                const term = currentSearchTerm.toLowerCase();
                filtered = filtered.filter(user => user.name.toLowerCase().includes(term) || user.email.toLowerCase().includes(term));
            }
            if (currentFilter === 'online') filtered = filtered.filter(user => user.status === 'online');
            else if (currentFilter === 'offline') filtered = filtered.filter(user => user.status === 'offline');
            else if (currentFilter === 'unread') filtered = filtered.filter(user => (unreadCounts[user.id] || 0) > 0);
            filteredUsers = filtered;
            displayUsers();
        }
        
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.filter-btn[data-filter="${filter}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            applyFilters();
        }
        
        function filterUsers() {
            currentSearchTerm = document.getElementById('searchInput').value;
            const clearBtn = document.getElementById('clearSearch');
            if (clearBtn) clearBtn.style.display = currentSearchTerm ? 'block' : 'none';
            applyFilters();
        }
        
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            currentSearchTerm = '';
            document.getElementById('clearSearch').style.display = 'none';
            applyFilters();
        }
        
        function showDeleteModal(userId, userName, userEmail) {
            if (userEmail === 'sa@gmail.com') {
                showToast('Cannot delete the main admin account!', true);
                return;
            }
            deleteTarget = { id: userId, name: userName };
            document.getElementById('deleteMessage').innerHTML = `Are you sure you want to delete user "<strong>${escapeHtml(userName)}</strong>"?`;
            document.getElementById('deleteModal').classList.add('active');
        }
        
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteTarget = null;
        }
        
        // ============ FIXED DELETE FUNCTION ============
        async function confirmDeleteUser() {
            if (!deleteTarget) return;
            
            showToast(`Deleting user "${deleteTarget.name}"...`);
            
            try {
                const token = localStorage.getItem('token');
                
                if (!token) {
                    showToast('❌ You are not logged in. Please login again.', true);
                    window.location.href = 'admin-login.html';
                    return;
                }
                
                console.log('🗑️ Deleting user ID:', deleteTarget.id);
                console.log('🔑 Using token:', token.substring(0, 20) + '...');
                
                const response = await fetch(`${API_URL}/api/admin/delete-user/${deleteTarget.id}`, {
                    method: 'DELETE',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('📡 Response status:', response.status);
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('✅ Delete success:', result);
                    showToast(`✅ ${result.message || `User "${deleteTarget.name}" deleted successfully!`}`);
                    
                    // Remove user from local arrays
                    allUsers = allUsers.filter(u => u.id !== deleteTarget.id);
                    delete unreadCounts[deleteTarget.id];
                    
                    // If deleted user was selected, clear chat
                    if (selectedUserId === deleteTarget.id) {
                        selectedUserId = null;
                        selectedUserName = null;
                        document.getElementById('selectedUserName').innerHTML = 'Select a user';
                        document.getElementById('chatMessages').innerHTML = '<div class="no-user-selected"><i class="fas fa-comments" style="font-size:48px;opacity:0.3;"></i><p>Select a user to start chatting</p></div>';
                    }
                    
                    applyFilters();
                    await loadUnreadCounts();
                } else {
                    let errorMsg = 'Failed to delete user';
                    try {
                        const error = await response.json();
                        errorMsg = error.message || errorMsg;
                    } catch(e) {
                        const errorText = await response.text();
                        errorMsg = errorText || errorMsg;
                    }
                    console.error('❌ Delete failed:', errorMsg);
                    showToast(`❌ ${errorMsg}`, true);
                }
            } catch (error) {
                console.error('Delete error:', error);
                showToast(`Error: ${error.message}. Make sure you're logged in as admin.`, true);
            }
            closeDeleteModal();
        }
        
        function displayUsers() {
            const usersDiv = document.getElementById('usersList');
            if (!usersDiv) return;
            if (filteredUsers.length === 0) {
                let msg = 'No users found';
                if (currentFilter === 'online') msg = 'No online users';
                if (currentFilter === 'offline') msg = 'No offline users';
                if (currentFilter === 'unread') msg = 'No unread messages';
                usersDiv.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><p>${msg}</p></div>`;
                return;
            }
            usersDiv.innerHTML = filteredUsers.map(user => {
                const unread = unreadCounts[user.id] || 0;
                const isOnline = user.status === 'online';
                const isMainAdmin = user.email === 'sa@gmail.com';
                return `
                    <div class="user-item ${selectedUserId === user.id ? 'active' : ''}" onclick="selectUser(${user.id}, '${escapeHtml(user.name)}')">
                        <div class="user-name">
                            <i class="fas ${isMainAdmin ? 'fa-crown' : 'fa-user-circle'}"></i> 
                            ${escapeHtml(user.name)}
                            ${isMainAdmin ? '<span style="color:#ffd700; font-size:11px;">(Master Admin)</span>' : ''}
                            <span class="status-indicator ${isOnline ? 'status-online' : 'status-offline'}">
                                <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                                ${isOnline ? 'Online' : 'Offline'}
                            </span>
                            ${unread > 0 ? `<span class="user-unread-count">${unread}</span>` : ''}
                        </div>
                        <div class="user-email">${escapeHtml(user.email)}</div>
                        <div class="user-balance">💰 Demo: $${(user.demoBalance || 0).toLocaleString()} | Real: $${(user.realBalance || 0).toLocaleString()}</div>
                        ${!isMainAdmin ? `<button class="delete-user-btn" onclick="event.stopPropagation(); showDeleteModal(${user.id}, '${escapeHtml(user.name)}', '${escapeHtml(user.email)}')"><i class="fas fa-trash"></i> Delete</button>` : ''}
                    </div>
                `;
            }).join('');
        }
        
        async function selectUser(userId, userName) {
            selectedUserId = userId;
            selectedUserName = userName;
            document.getElementById('selectedUserName').innerHTML = escapeHtml(userName);
            await markMessagesAsRead(userId);
            await loadUserMessages(userId);
            await loadUnreadCounts();
            applyFilters();
        }
        
        async function markMessagesAsRead(userId) {
            try {
                await fetch(`${API_URL}/api/messages/mark-admin-read`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId })
                });
            } catch (error) { console.error('Error marking messages as read:', error); }
        }
        
        async function loadUserMessages(userId) {
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading messages...</p></div>';
            try {
                const response = await fetch(`${API_URL}/api/admin/messages/${userId}`);
                if (response.ok) {
                    const data = await response.json();
                    displayMessages(data.messages || []);
                } else {
                    displayMessages([]);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
                displayMessages([]);
            }
        }
        
        function viewImage(url) {
            const viewer = document.getElementById('imageViewer');
            const img = document.getElementById('viewerImg');
            if (viewer && img) {
                img.src = fixImageUrl(url);
                viewer.classList.add('active');
            }
        }
        
        function closeImageViewer() {
            document.getElementById('imageViewer').classList.remove('active');
        }
        
        function isImageUrl(text) {
            if (!text) return false;
            return (text.startsWith('http') && (text.includes('.jpg') || text.includes('.png') || text.includes('.jpeg') || text.includes('.gif') || text.includes('uploads/'))) ||
                   text.includes('/uploads/');
        }
        
        // ============ FIXED: Messages display with NEWEST AT BOTTOM ============
        function displayMessages(messages) {
            const chatDiv = document.getElementById('chatMessages');
            if (!chatDiv) return;
            
            if (!messages || messages.length === 0) {
                chatDiv.innerHTML = '<div class="no-user-selected"><i class="fas fa-comments" style="font-size:48px;opacity:0.3;"></i><p>No messages yet. Start the conversation!</p></div>';
                return;
            }
            
            // Sort messages from OLDEST to NEWEST (oldest first, newest last)
            const sortedMessages = [...messages].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            chatDiv.innerHTML = sortedMessages.map(msg => {
                let imageUrl = null;
                let messageText = msg.text;
                
                if (msg.hasImage && msg.imageUrl) imageUrl = msg.imageUrl;
                else if (isImageUrl(msg.text)) { 
                    imageUrl = msg.text; 
                    messageText = '📷 Image'; 
                }
                
                if (imageUrl) {
                    const fixedUrl = fixImageUrl(imageUrl);
                    return `
                        <div class="chat-message ${msg.sender}">
                            <div class="message-sender">${msg.sender === 'user' ? escapeHtml(selectedUserName) : 'Admin (You)'}</div>
                            <div class="message-bubble">
                                <img src="${fixedUrl}" class="chat-image" onclick="viewImage('${fixedUrl}')" alt="Image" 
                                     onerror="this.onerror=null; this.src='https://via.placeholder.com/200x150?text=Image+Not+Found';">
                            </div>
                            <div class="message-time">${new Date(msg.timestamp).toLocaleString()}</div>
                        </div>
                    `;
                }
                
                return `
                    <div class="chat-message ${msg.sender}">
                        <div class="message-sender">${msg.sender === 'user' ? escapeHtml(selectedUserName) : 'Admin (You)'}</div>
                        <div class="message-bubble">${escapeHtml(messageText)}</div>
                        <div class="message-time">${new Date(msg.timestamp).toLocaleString()}</div>
                    </div>
                `;
            }).join('');
            
            // Auto-scroll to bottom to show latest message
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        async function sendAdminReply() {
            const input = document.getElementById('chatInput');
            const text = input ? input.value.trim() : '';
            if (!text || !selectedUserId) {
                if (!selectedUserId) showToast('Please select a user first', true);
                return;
            }
            try {
                const response = await fetch(`${API_URL}/api/admin/reply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: selectedUserId, text, adminName: 'Admin' })
                });
                if (response.ok) {
                    if (input) input.value = '';
                    await loadUserMessages(selectedUserId);
                    await loadUnreadCounts();
                    applyFilters();
                } else {
                    showToast('Failed to send reply', true);
                }
            } catch (error) {
                console.error('Error sending reply:', error);
                showToast('Server error. Could not send message.', true);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function logout() {
            localStorage.removeItem('isAdmin');
            localStorage.removeItem('token');
            showToast('Logged out successfully');
            setTimeout(() => { window.location.href = 'admin-login.html'; }, 500);
        }
        
        // Polling
        setInterval(() => {
            if (selectedUserId) loadUserMessages(selectedUserId);
        }, 5000);
        setInterval(() => {
            loadUsers();
        }, 8000);
        
        // Initialization
        checkAdmin();
        loadUsers();
        
        document.getElementById('deleteModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('deleteModal')) closeDeleteModal();
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeImageViewer(); closeDeleteModal(); } });
    </script>
</body>
</html>
