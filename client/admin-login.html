<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CryptoTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(18, 25, 55, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            width: 380px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            color: #8a92b0;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,212,255,0.3);
        }

        .error {
            color: #ff4757;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            background: rgba(255,71,87,0.1);
            padding: 10px;
            border-radius: 8px;
        }
        
        .success {
            color: #00e676;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            background: rgba(0,230,118,0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .info-box {
            margin-top: 20px;
            padding: 12px;
            background: rgba(0,212,255,0.1);
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            color: #8a92b0;
        }

        .info-box i {
            color: #00d4ff;
            margin-right: 5px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Admin Login</h2>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="username" placeholder="sa@gmail.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" onkeypress="if(event.key==='Enter') adminLogin()">
        </div>
        <button onclick="adminLogin()">Login</button>
        <div id="loadingMsg" class="loading">
            <span class="spinner"></span> <span style="margin-left: 8px;">Logging in...</span>
        </div>
        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>
        <div class="info-box">
            <i class="fas fa-info-circle"></i> Use your registered email and password.<br>
            <strong>sa@gmail.com</strong> has full admin access.
        </div>
    </div>

    <script>
        // ============ API CONFIGURATION ============
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000'
            : 'https://cryptotrade-pro.onrender.com';
        
        console.log('🔗 API URL:', API_URL);
        
        async function adminLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                document.getElementById('errorMsg').innerText = 'Please enter email and password';
                document.getElementById('successMsg').innerText = '';
                return;
            }
            
            // Show loading
            document.getElementById('loadingMsg').classList.add('active');
            document.getElementById('errorMsg').innerText = '';
            document.getElementById('successMsg').innerText = '';
            
            try {
                // Call the backend login API
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: username, password: password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store the token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', username);
                    localStorage.setItem('userName', data.user.name);
                    
                    // Check if this user is an admin (sa@gmail.com)
                    if (username === 'sa@gmail.com') {
                        localStorage.setItem('isAdmin', 'true');
                        document.getElementById('successMsg').innerText = '✅ Admin login successful! Redirecting...';
                        document.getElementById('errorMsg').innerText = '';
                        
                        setTimeout(() => {
                            window.location.href = 'admin.html';
                        }, 1000);
                    } else {
                        // Logged in but not admin
                        document.getElementById('errorMsg').innerText = '❌ You do not have admin privileges. Only sa@gmail.com can access admin panel.';
                        document.getElementById('loadingMsg').classList.remove('active');
                        localStorage.removeItem('token');
                        localStorage.removeItem('isAdmin');
                    }
                } else {
                    document.getElementById('errorMsg').innerText = data.message || 'Invalid credentials. Please check your email and password.';
                    document.getElementById('loadingMsg').classList.remove('active');
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('errorMsg').innerText = 'Cannot connect to server. Make sure the server is running.';
                document.getElementById('loadingMsg').classList.remove('active');
            }
        }
        
        // Check if already logged in as admin
        if (localStorage.getItem('isAdmin') === 'true' && localStorage.getItem('token')) {
            // Verify token is still valid
            fetch(`${API_URL}/api/user/data`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            }).then(response => {
                if (response.ok) {
                    window.location.href = 'admin.html';
                } else {
                    localStorage.removeItem('isAdmin');
                    localStorage.removeItem('token');
                }
            }).catch(() => {
                localStorage.removeItem('isAdmin');
                localStorage.removeItem('token');
            });
        }
        
        // Add placeholder hints
        document.getElementById('username').placeholder = 'sa@gmail.com';
        document.getElementById('password').placeholder = 'Enter your password';
    </script>
</body>
</html>
